name: Ubuntu Sanitizers

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ubuntu-sanitizers:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: true
      matrix:
        sanitizer: [asan, tsan, ubsan]
    name: Sanitizer - clang - debug - ${{ matrix.sanitizer }}
    steps:
      - uses: actions/checkout@v4
      # ubuntu-build-steps installs build deps and runs configure, build, and ctest.
      # Keep unit|install as the fast broad sanitizer suite; graphics runs below.
      - uses: ./.github/actions/ubuntu-build-steps
        with:
          cmake_workflow: workflow-test-clang-debug-${{ matrix.sanitizer }}
          test_label_regex: unit|install

  ubuntu-graphics-sanitizers:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: true
      # TSan graphics coverage needs separate GLFW/ImGui thread-safety requirements.
      matrix:
        sanitizer: [asan, ubsan]
    name: Graphics sanitizer - clang - debug - ${{ matrix.sanitizer }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/ubuntu-build-steps
        with:
          cmake_workflow: workflow-test-clang-debug-${{ matrix.sanitizer }}
          test_label_regex: graphics
          use_xvfb: 'true'

  sanitizers-summary:
    runs-on: ubuntu-latest
    needs: [ubuntu-sanitizers, ubuntu-graphics-sanitizers]
    if: always()
    steps:
      - name: Check sanitizers status
        run: |
          if [ "${{ needs.ubuntu-sanitizers.result }}" != "success" ] || [ "${{ needs.ubuntu-graphics-sanitizers.result }}" != "success" ]; then
            echo "Sanitizer checks failed"
            exit 1
          fi
          echo "All sanitizer checks passed"
