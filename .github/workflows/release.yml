name: Create Release

# Trigger the workflow only when a tag starting with 'v' is pushed
# Example: v1.0.0, v2.3.1-beta, etc.
on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: get_version
        run: |
          echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Verify CMake version matches tag
        env:
          TAG_VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          tag_version="$TAG_VERSION"
          cmake_version="$(
            awk '
              /^[[:space:]]*project[[:space:]]*\([[:space:]]*plinth/ { in_project = 1 }
              in_project && /VERSION/ {
                for (i = 1; i <= NF; i++) {
                  if ($i == "VERSION") {
                    print $(i + 1)
                    exit
                  }
                }
              }
              in_project && /\)/ { in_project = 0 }
            ' CMakeLists.txt
          )"

          if [ -z "$cmake_version" ]; then
            echo "Could not find project(plinth VERSION ...) in CMakeLists.txt" >&2
            exit 1
          fi

          if [ "$tag_version" != "$cmake_version" ]; then
            echo "Tag version v${tag_version} does not match CMake project version ${cmake_version}" >&2
            exit 1
          fi

      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        id: git_cliff
        with:
          config: cliff.toml
          args: -vv --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false
          body: ${{ steps.git_cliff.outputs.content }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
