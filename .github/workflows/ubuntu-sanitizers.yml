name: Ubuntu Sanitizers

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ubuntu-sanitizers:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: true
      matrix:
        sanitizer: [asan, tsan, ubsan]
    name: Sanitizer - clang - debug - ${{ matrix.sanitizer }}
    steps:
      - uses: actions/checkout@v4
      # ubuntu-build-steps installs build deps and runs configure, build, and ctest.
      # Only unit|install tests are needed; graphics tests do not exercise sanitizer
      # instrumented code paths and are covered by the dedicated graphics job.
      - uses: ./.github/actions/ubuntu-build-steps
        with:
          cmake_workflow: workflow-test-clang-debug-${{ matrix.sanitizer }}
          test_label_regex: unit|install
  
  sanitizers-summary:
    runs-on: ubuntu-latest
    needs: ubuntu-sanitizers
    if: always()
    steps:
      - name: Check sanitizers status
        run: |
          if [ "${{ needs.ubuntu-sanitizers.result }}" != "success" ]; then
            echo "Sanitizer checks failed"
            exit 1
          fi
          echo "All sanitizer checks passed"
