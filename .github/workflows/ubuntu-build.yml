name: Ubuntu Build

on:
  push:
    branches: [main, 'develop-**']
  pull_request:
    branches: [main]

jobs:
  ubuntu-build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: true
      matrix:
        compiler: [gcc, clang]
        build_type: [debug, release]
        exclude:
          # For develop-* branches, run only gcc+debug
          - compiler: ${{ startsWith(github.ref, 'refs/heads/develop-') && 'clang' || '_no_match_' }}
          - build_type: ${{ startsWith(github.ref, 'refs/heads/develop-') && 'release' || '_no_match_' }}
    name: Build - ${{ matrix.compiler }} - ${{ matrix.build_type }}
    steps:
      - uses: actions/checkout@v4
      # ubuntu-build-steps installs build deps (including xvfb for headless OpenGL)
      # and runs configure, build, and ctest under xvfb-run.
      - uses: ./.github/actions/ubuntu-build-steps
        with:
          cmake_workflow: workflow-test-${{ matrix.compiler }}-${{ matrix.build_type }}
  
  ubuntu-build-summary:
    runs-on: ubuntu-latest
    needs: ubuntu-build
    if: always()
    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.ubuntu-build.result }}" != "success" ]; then
            echo "Ubuntu build failed"
            exit 1
          fi
          echo "All Ubuntu builds passed"
