name: 'Ubuntu CMake Workflow'
description: 'Run a CMake workflow preset for Ubuntu builds'
inputs:
  cmake_workflow:
    description: 'The cmake workflow to use.'
    required: true
  install_tools:
    description: 'Additional tools to install (space-separated list: doxygen, lcov, clang-tidy, cppcheck)'
    required: false
    default: ''
  build_native_args:
    description: 'Additional native build-tool arguments passed after cmake --build --'
    required: false
    default: ''
  configure_args:
    description: 'Additional CMake cache or configure arguments'
    required: false
    default: ''
  build_target:
    description: 'Optional CMake build target'
    required: false
    default: ''
  test_label_regex:
    description: 'CTest label regex passed to ctest -L (e.g. "unit|install" or "graphics")'
    required: false
    default: 'unit|install'
  test_name_regex:
    description: 'Optional CTest test-name regex passed to ctest -R'
    required: false
    default: ''
  skip_tests:
    description: 'When true, do not execute CTest'
    required: false
    default: 'false'
  use_xvfb:
    description: 'When true, install xvfb and execute ctest through xvfb-run'
    required: false
    default: 'false'

runs:
  using: "composite"
  steps:
    - name: Set VCPKG_ROOT
      run: echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> $GITHUB_ENV
      shell: bash
    
    - name: Install build tools
      run: |
        sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
        sudo apt-get update
        # gcc-15/g++-15 and clang-20/clang++-20: compilers used by the presets.
        # libclang-rt-20-dev: clang sanitizer runtime (ASan/TSan/UBSan)
        # ninja-build: fast build backend used by the CMake presets
        # uuid-dev: required by the stduuid dependency
        # libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev: X11 headers needed to build GLFW
        # libgl-dev: OpenGL headers; the system Mesa (llvmpipe) provides the runtime
        if [[ "${{ inputs.use_xvfb }}" == "true" ]]; then
          # xvfb: X Virtual Framebuffer — GitHub Actions runners have no display server.
          #   plinth uses GLFW which calls XOpenDisplay() at glfwInit() time; without a
          #   display that call fails and every test that opens a window aborts immediately.
          #   xvfb-run (see Test step) starts a temporary in-process display so glfwInit()
          #   and glfwCreateWindow() succeed against the system Mesa/llvmpipe renderer.
          sudo apt-get install -y gcc-15 g++-15 clang-20 libclang-rt-20-dev ninja-build uuid-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl-dev xvfb ${{ inputs.install_tools }}
        else
          sudo apt-get install -y gcc-15 g++-15 clang-20 libclang-rt-20-dev ninja-build uuid-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl-dev ${{ inputs.install_tools }}
        fi
      shell: bash
    
    - name: Extract preset names
      id: preset
      run: |
        WORKFLOW_NAME="${{ inputs.cmake_workflow }}"
        # Extract compiler and build type from workflow name
        # workflow-test-gcc-release -> conf-gcc-release
        BASE_NAME="${WORKFLOW_NAME#workflow-test-}"
        echo "configure=conf-${BASE_NAME}" >> $GITHUB_OUTPUT
        echo "build=build-${BASE_NAME}" >> $GITHUB_OUTPUT
        echo "test=test-${BASE_NAME}" >> $GITHUB_OUTPUT
      shell: bash

    - name: Configure
      run: |
        cmake --preset ${{ steps.preset.outputs.configure }} -DBUILD_SHARED_LIBS=ON ${{ inputs.configure_args }}
      shell: bash
    
    - name: Build
      run: |
        BUILD_COMMAND=(cmake --build --preset ${{ steps.preset.outputs.build }})
        if [ -n "${{ inputs.build_target }}" ]; then
          BUILD_COMMAND+=(--target "${{ inputs.build_target }}")
        fi
        if [ -n "${{ inputs.build_native_args }}" ]; then
          BUILD_COMMAND+=(-- ${{ inputs.build_native_args }})
        fi
        "${BUILD_COMMAND[@]}"
      shell: bash
    
    - name: Test
      if: inputs.skip_tests != 'true'
      run: |
        TEST_COMMAND=(ctest --preset ${{ steps.preset.outputs.test }} --label-regex "${{ inputs.test_label_regex }}")
        if [ -n "${{ inputs.test_name_regex }}" ]; then
          TEST_COMMAND+=(-R "${{ inputs.test_name_regex }}")
        fi
        if [[ "${{ inputs.use_xvfb }}" == "true" ]]; then
          # xvfb-run starts a throwaway X server for the duration of ctest so that
          # GLFW can open an OpenGL window (rendered in software by Mesa/llvmpipe).
          # --auto-servernum selects a free display number automatically, which avoids
          # conflicts when multiple matrix jobs run on the same host.
          # --server-args="-noreset -ac": -noreset prevents the X server from resetting
          # when all clients disconnect (e.g. when GlfwWindow::~GlfwWindow calls
          # glfwTerminate between test cases). -ac disables access control.
          xvfb-run --auto-servernum --server-args="-noreset -ac" "${TEST_COMMAND[@]}"
        else
          "${TEST_COMMAND[@]}"
        fi
      shell: bash
