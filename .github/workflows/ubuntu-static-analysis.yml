name: Ubuntu Static Analysis

on:
  push:
    branches: [main, 'develop-**']
  pull_request:
    branches: [main]

jobs:
  ubuntu-static-analysis:
    runs-on: ubuntu-24.04
    name: Static Analysis - Clang-Tidy
    steps:
      - uses: actions/checkout@v4
      # ubuntu-build-steps installs build deps, clang-tidy, and runs configure,
      # build, and ctest. Only unit|install tests are needed.
      - uses: ./.github/actions/ubuntu-build-steps
        with:
          cmake_workflow: workflow-test-clang-debug
          install_tools: clang-tidy-20
          test_label_regex: unit|install
          # Ninja -k 0 keeps building independent targets after failures, so
          # clang-tidy reports as many compile and analysis issues as possible.
          build_native_args: "-k 0"
