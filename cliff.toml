# git-cliff configuration for GitHub Release notes generated from Conventional Commits.

[changelog]
header = ""
body = """
{% if version %}## {{ version | trim_start_matches(pat="v") }}{% else %}## Unreleased{% endif %}

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim }}
{% for commit in commits %}
- {{ commit.message | split(pat="\n") | first | trim | upper_first }}{% if commit.remote.pr_number %} in #{{ commit.remote.pr_number }}{% endif %}{% if commit.remote.username %} by @{{ commit.remote.username }}{% endif %}
{% endfor %}

{% endfor %}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
require_conventional = true
split_commits = false
protect_breaking_commits = true
filter_commits = true
fail_on_unmatched_commit = true
tag_pattern = "v[0-9]*"
sort_commits = "oldest"

commit_parsers = [
    { message = '^Merge ', skip = true },
    { message = '^[a-z]+(\([^)]+\))?!', group = "Breaking Changes" },
    { body = '.*BREAKING CHANGE:.*', group = "Breaking Changes" },
    { message = '^feat', group = "Features" },
    { message = '^fix', group = "Fixes" },
    { message = '^perf', group = "Performance" },
    { message = '^docs', group = "Documentation" },
    { message = '^build|^ci', group = "Build and CI" },
    { message = '^refactor|^test|^chore|^revert', group = "Maintenance" },
]
