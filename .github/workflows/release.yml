name: Create Release

# Trigger the workflow only when a tag starting with 'v' is pushed
# Example: v1.0.0, v2.3.1-beta, etc.
on:
  push:
    tags:
      - 'v*'

jobs:
  build-packages:
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            workflow-preset: workflow-package-gcc-shared
            artifact-path: out/packages/package-gcc-release-shared
          - os: windows-latest
            workflow-preset: workflow-package-msvc-shared
            artifact-path: out/packages/package-msvc-release-shared
    
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set VCPKG_ROOT (Ubuntu)
        if: matrix.os == 'ubuntu-24.04'
        run: echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> $GITHUB_ENV
        shell: bash
      
      - name: Set VCPKG_ROOT (Windows)
        if: matrix.os == 'windows-latest'
        run: echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV
        shell: pwsh
      
      - name: Install build tools (Ubuntu)
        if: matrix.os == 'ubuntu-24.04'
        run: sudo apt-get update && sudo apt-get install -y gcc-14 g++-14 ninja-build uuid-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl-dev
        shell: bash
      
      - name: Install NSIS (Windows only)
        if: matrix.os == 'windows-latest'
        run: choco install nsis -y
      
      - name: Create package
        run: |
          cmake --workflow --preset ${{ matrix.workflow-preset }}
        shell: bash
      
      - name: Upload ${{ matrix.os }} artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-shared-build
          path: ${{ github.workspace }}/${{ matrix.artifact-path }}/*.*
          retention-days: 1

  create-release:
    needs: build-packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: get_version
        run: |
          echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Verify CMake version matches tag
        run: |
          tag_version="${{ steps.get_version.outputs.version }}"
          cmake_version="$(
            awk '
              /^[[:space:]]*project[[:space:]]*\([[:space:]]*geoqik/ { in_project = 1 }
              in_project && /VERSION/ {
                for (i = 1; i <= NF; i++) {
                  if ($i == "VERSION") {
                    print $(i + 1)
                    exit
                  }
                }
              }
              in_project && /\)/ { in_project = 0 }
            ' CMakeLists.txt
          )"

          if [ -z "$cmake_version" ]; then
            echo "Could not find project(geoqik VERSION ...) in CMakeLists.txt" >&2
            exit 1
          fi

          if [ "$tag_version" != "$cmake_version" ]; then
            echo "Tag version v${tag_version} does not match CMake project version ${cmake_version}" >&2
            exit 1
          fi

      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        id: git_cliff
        with:
          config: cliff.toml
          args: -vv --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all build artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false
          body: ${{ steps.git_cliff.outputs.content }}
          files: |
            ubuntu-24.04-shared-build/*
            windows-latest-shared-build/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
